# See https://wiki.hyprland.org/Configuring/Binds/
# Add stuff here
# Use #! to add an extra column on the cheatsheet
# Use ##! to add a section in that column
# Add a comment after a bind to add a description, like above
#!
##! User
bind = Ctrl+Super, Slash, exec, xdg-open ~/.config/illogical-impulse/config.json # Edit shell config
bind = Ctrl+Super+Alt, Slash, exec, xdg-open ~/.config/hypr/custom/keybinds.conf # Edit extra keybinds
##! Session(Extra)
bindd = Super, Backspace, Open Session, global, quickshell:sessionToggle  # Open Session
##! Workspace Group
bind = Ctrl+Super, Z, workspace, r-10
bind = Ctrl+Super, X, workspace, r+10
binde = Super, Semicolon, resizeactive, -25 0 # [hidden]
binde = Super, Apostrophe, resizeactive, 25 0 # [hidden]
##! Window Movement (Cross-Monitor)
# Unbind default movewindow bindings
unbind = Super+Shift, Left
unbind = Super+Shift, Right
unbind = Super+Shift, Up
unbind = Super+Shift, Down
# New cross-monitor window movement
bind = Super+Shift, Left, exec, ~/.config/hypr/custom/scripts/move_window_to_monitor.sh l # [hidden]
bind = Super+Shift, Right, exec, ~/.config/hypr/custom/scripts/move_window_to_monitor.sh r # [hidden]
bind = Super+Shift, Up, exec, ~/.config/hypr/custom/scripts/move_window_to_monitor.sh u # [hidden]
bind = Super+Shift, Down, exec, ~/.config/hypr/custom/scripts/move_window_to_monitor.sh d # [hidden]

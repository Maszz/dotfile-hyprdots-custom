# Put general config stuff here
# Here's a list of every variable: https://wiki.hconda inityprland.org/Configuring/Variables/
# 27" DP-5 -> vertical (portrait), placed at the origin
# After rotate: 1440×2560
monitor = DP-5, 2560x1440@59.951, 0x0, 1, transform, 3

# 24" DP-4 -> horizontal (landscape), on the RIGHT of DP-5 and centered vertically
# x = width of rotated DP-5 = 1440
# y = (2560 - 1080)/2 = 740
monitor = DP-4, 1920x1080@60, 1440x740, 1, transform, 0
# Workspaces 1–10 → DP-4 (24")
workspace = 1,  monitor:DP-4, default:true
workspace = 2,  monitor:DP-4
workspace = 3,  monitor:DP-4
workspace = 4,  monitor:DP-4
workspace = 5,  monitor:DP-4
workspace = 6,  monitor:DP-4
workspace = 7,  monitor:DP-4
workspace = 8,  monitor:DP-4
workspace = 9,  monitor:DP-4
workspace = 10, monitor:DP-4

# Workspaces 11–20 → DP-5 (27" vertical)
workspace = 11, monitor:DP-5, default:true
workspace = 12, monitor:DP-5
workspace = 13, monitor:DP-5
workspace = 14, monitor:DP-5
workspace = 15, monitor:DP-5
workspace = 16, monitor:DP-5
workspace = 17, monitor:DP-5
workspace = 18, monitor:DP-5
workspace = 19, monitor:DP-5
workspace = 20, monitor:DP-5

input {
  kb_layout = us,th
  kb_options = grp:alt_shift_toggle
} 
